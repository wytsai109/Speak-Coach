<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script type="module" src="firebase.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container glass-panel">
        <header>
            <div class="logo">
                <i class="fa-solid fa-language"></i>
                <h1>AI Coach</h1>
            </div>
            <div class="header-right">
                <div id="userProfile" class="user-profile hidden">
                    <img id="userAvatar" src="" alt="Avatar" class="user-avatar">
                    <span id="userName" class="user-name"></span>
                    <button id="logoutBtn" class="icon-btn-small" title="Logout"><i class="fa-solid fa-sign-out-alt"></i></button>
                </div>
                <button id="settingsBtn" class="icon-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
            </div>
        </header>

        <div id="settingsPanel" class="settings-panel hidden">
            <div class="input-group">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your Gemini API Key">
            </div>
            <div class="input-group">
                <label for="targetLang">Target Language</label>
                <select id="targetLang">
                    <option value="en-US">English (US)</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="es-ES">Spanish</option>
                    <option value="zh-TW">Chinese (Taiwan)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="modelSelect">AI Model</label>
                <select id="modelSelect">
                    <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (Recommended for Speed)</option>
                    <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                    <option value="gemini-flash-latest">gemini-flash-latest</option>
                    <option value="gemini-3.5-flash">gemini-3.5-flash</option>
                    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                </select>
            </div>
        </div>

        <main class="chat-container" id="chatContainer">
            <div class="message ai-message">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-content">
                    <p>Hello! I am your AI language coach. Please enter your Gemini API Key in the settings, then click the microphone button to start speaking!</p>
                </div>
            </div>
        </main>

        <div class="controls-container">
            <div id="statusText" class="status-text">Ready</div>
            <div class="input-area">
                <button id="micBtn" class="mic-btn" title="Click to Speak">
                    <i class="fa-solid fa-microphone"></i>
                    <div class="ring-1"></div>
                    <div class="ring-2"></div>
                </button>
                <input type="text" id="textInput" class="chat-input" placeholder="Type your message..." autocomplete="off">
                <button id="sendBtn" class="send-btn" title="Send Message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card glass-panel">
            <div class="logo login-logo">
                <i class="fa-solid fa-language"></i>
                <h1>AI Coach</h1>
            </div>
            <p class="login-subtitle">Sign in to save your progress and secure your data.</p>
            <button id="googleLoginBtn" class="login-btn google-btn">
                <i class="fa-brands fa-google"></i>
                Sign in with Google
            </button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
